            --bg-body: #1e3a8a; 
            --card-text-main: #1e293b;
            --card-text-muted: #64748b;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: white;
            min-height: 100vh;
            padding: 15px;
        }

        @media (min-width: 768px) {
            body {
                padding: 25px;
            }
        }

        .header-section {
            max-width: 1400px;
            margin: 0 auto 25px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        @media (min-width: 768px) {
            .header-section {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .main-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
        }

        @media (min-width: 768px) {
            .main-title {
                font-size: 1.6rem;
                text-align: left;
            }
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            background-color: white;
            color: #000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .navigation-bar {
            max-width: 1400px;
            margin: 0 auto 20px auto;
            display: none; 
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-btn {
            background-color: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: rgba(255,255,255,0.3);
        }

        .download-all-btn {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .download-all-btn:hover {
            background-color: #15803d;
        }

        .download-all-btn:disabled {
            background-color: #a8a29e;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 576px) {
            .dashboard-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }
        }

        @media (min-width: 992px) {
            .dashboard-grid {
                grid-template-columns: repeat(4, 1fr); 
                gap: 20px;
            }
        }

        .folder-card {
            background-color: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .folder-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .card-top {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @media (min-width: 576px) {
            .card-top {
                height: 140px;
            }
        }

        .logo-box {
            background-color: white;
            width: 65px;
            height: 65px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 12px -3px rgba(0, 0, 0, 0.1);
            padding: 8px;
        }

        @media (min-width: 576px) {
            .logo-box {
                width: 85px;
                height: 85px;
                border-radius: 18px;
                padding: 10px;
            }
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-bottom {
            padding: 12px;
            background-color: white;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            text-align: center;
        }

        @media (min-width: 576px) {
            .card-bottom {
                padding: 20px;
                text-align: left;
            }
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--card-text-main);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        @media (min-width: 576px) {
            .card-title {
                font-size: 1.15rem;
                margin-bottom: 6px;
            }
        }

        .card-desc {
            font-size: 0.75rem;
            color: var(--card-text-muted);
            line-height: 1.4;
            margin-bottom: 10px;
            height: 2.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (min-width: 576px) {
            .card-desc {
                font-size: 0.85rem;
                margin-bottom: 15px;
                height: 2.8rem;
            }
        }

        .card-meta-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--card-text-muted);
            border-top: 1px solid #f1f5f9;
            padding-top: 8px;
            margin-top: auto;
        }

        @media (min-width: 576px) {
            .card-meta-row {
                font-size: 0.8rem;
                padding-top: 12px;
                justify-content: flex-start;
            }
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .meta-icon-file { color: #0284c7; }

        .flyer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 576px) {
            .flyer-grid {
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                gap: 16px;
            }
        }

        .flyer-card {
            background-color: white;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            color: var(--card-text-main);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .flyer-img-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background-color: #f8fafc;
        }

        .flyer-img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flyer-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        @media (min-width: 576px) {
            .flyer-info {
                padding: 15px;
            }
        }

        .flyer-title {
            font-size: 0.8rem;
            font-weight: 700;
            height: 2.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        @media (min-width: 576px) {
            .flyer-title {
                font-size: 0.85rem;
                height: 2.4rem;
                margin-bottom: 10px;
            }
        }

        .download-btn {
            background-color: var(--bg-dark-blue);
            color: white;
            text-decoration: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            margin-top: auto;
            border: none;
            cursor: pointer;
        }

        @media (min-width: 576px) {
            .download-btn {
                padding: 10px;
                font-size: 0.85rem;
            }
        }

        .section-divider {
            grid-column: 1 / -1;
            font-size: 1rem;
            font-weight: 700;

            letter-spacing: 1px;
            margin-top: 15px;

        }

        @media (min-width: 576px) {
            .section-divider {
                font-size: 1.1rem;
                margin-top: 20px;
            }
        }
    </style>

};

    "SHINDAIWA": 7,

        const mainGrid = document.getElementById('mainGrid');
        const navigationBar = document.getElementById('navigationBar');
        const backBtn = document.getElementById('backBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const searchInput = document.getElementById('searchInput');

        let currentView = 'dashboard';
        let activeFlyersList = []; 
        let currentFolderTitle = '';

        function loadDashboard() {
            currentView = 'dashboard';
            navigationBar.style.display = 'none';
            mainGrid.innerHTML = '';
            mainGrid.className = 'dashboard-grid';
            activeFlyersList = [];
            currentFolderTitle = '';

            // 🗂️ Categorías primero
            const catDivider = document.createElement('div');
            catDivider.className = 'section-divider';
            catDivider.innerText = '🗂️ Buscar por Categoría';
            mainGrid.appendChild(catDivider);

            Object.keys(categoryCounts).forEach(catName => {
                const count = categoryCounts[catName];
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => openDrilldown('category', catName);
                card.innerHTML = `
                    <div class="card-top" style="background: linear-gradient(135deg, #f1f5f9, #cbd5e1);">
                        <div class="logo-box" style="font-size: 2rem;">📦</div>
                    </div>
                    <div class="card-bottom">
                        <h3 class="card-title">${catName}</h3>
                        <p class="card-desc">Publicidades unificadas de la categoría ${catName}.</p>
                        <div class="card-meta-row">
                            <div class="meta-item">
                                <span class="meta-icon-file">📄</span> ${count} archivos
                            </div>
                        </div>
                    </div>
                `;
                mainGrid.appendChild(card);
            });

            // 📂 Marcas segundo
            const brandDivider = document.createElement('div');
            brandDivider.className = 'section-divider';
            brandDivider.innerText = '📂 Buscar por Marca';
            mainGrid.appendChild(brandDivider);

            Object.keys(brandMeta).forEach(brandName => {
                const count = brandCounts[brandName] || 0;
                const meta = brandMeta[brandName];

                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => openDrilldown('brand', brandName);
                card.innerHTML = `
                    <div class="card-top" style="background: ${meta.bg};">
                        <div class="logo-box">
                            <img src="${meta.logo}" alt="${brandName}">
                        </div>
                    </div>
                    <div class="card-bottom">
                        <h3 class="card-title">${brandName}</h3>
                        <p class="card-desc">${meta.desc}</p>
                        <div class="card-meta-row">
                            <div class="meta-item">
                                <span class="meta-icon-file">📄</span> ${count} archivos
                            </div>
                        </div>
                    </div>
                `;
                mainGrid.appendChild(card);
            });
        }

        function openDrilldown(type, value) {
            currentView = 'drilldown';
            currentFolderTitle = value;
            navigationBar.style.display = 'flex';
            downloadAllBtn.style.display = 'inline-flex';
            mainGrid.className = 'flyer-grid'; 
            
            activeFlyersList = productDatabase.filter(p => {
                if (type === 'brand') return p.brand === value;
                if (type === 'category') return p.category === value;
                return false;
            });

            renderFlyers(activeFlyersList);
        }

        function renderFlyers(products) {
            mainGrid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'flyer-card';

                card.innerHTML = `
                    <div class="flyer-img-container">
                        <img src="${product.image}" alt="${product.title}" onerror="this.src='https://placehold.co/300x300?text=Imagen+${product.id}'" loading="lazy">
                    </div>
                    <div class="flyer-info">
                        <h4 class="flyer-title" title="${product.title}">${product.title}</h4>
                        <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 12px;">Código: <b>${product.id}</b></p>
                        <button onclick="downloadSingle('${product.image}', 'DISAR_${product.id}.jpg')" class="download-btn">Descargar Arte</button>
                    </div>
                `;
                mainGrid.appendChild(card);
            });
        }

        function downloadSingle(imgUrl, filename) {
            fetch(imgUrl)
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.blob();
                })
                .then(blob => {
                    const blobURL = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobURL;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobURL);
                })
                .catch(() => {
                    const link = document.createElement('a');
                    link.href = imgUrl;
                    link.download = filename;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
        }

        downloadAllBtn.onclick = function() {
            if (activeFlyersList.length === 0) return;
            
            const originalText = downloadAllBtn.innerHTML;
            downloadAllBtn.disabled = true;
            
            let i = 0;
            const interval = setInterval(() => {
                if (i >= activeFlyersList.length) {
                    clearInterval(interval);
                    downloadAllBtn.disabled = false;
                    downloadAllBtn.innerHTML = originalText;
                    return;
                }
                
                const product = activeFlyersList[i];
                downloadAllBtn.innerText = `⚡ Descargando (${i + 1}/${activeFlyersList.length})...`;
                downloadSingle(product.image, `DISAR_${product.id}.jpg`);
                i++;
            }, 400); 
        };

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === '') {
                loadDashboard();
                return;
            }

            currentView = 'search';
            navigationBar.style.display = 'flex';
            downloadAllBtn.style.display = 'none'; 
            mainGrid.className = 'flyer-grid';

            activeFlyersList = productDatabase.filter(p => {
                return p.title.toLowerCase().includes(query) || p.id.toLowerCase().includes(query) || p.tags.toLowerCase().includes(query);
            });

            if (activeFlyersList.length === 0) {
                mainGrid.innerHTML = `<div class="section-divider" style="color: white; border: none;">No se encontraron publicidades para "${query}"</div>`;
            } else {
                renderFlyers(activeFlyersList);
            }
        });

        backBtn.onclick = () => {
            searchInput.value = '';
            loadDashboard();
        };

        loadDashboard();
    </script>
